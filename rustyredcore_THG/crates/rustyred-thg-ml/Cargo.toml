[package]
name = "rustyred-thg-ml"
version = "0.5.0"
edition = "2021"
description = "Shared graph tensor and message-passing primitives for RustyRedCore-THG learned organs."
license = "MIT"
rust-version = "1.85"

[features]
default = []
burn = ["dep:burn"]
cubecl = ["burn", "dep:cubecl"]
colpali-candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:hf-hub",
    "dep:image",
    "dep:serde_json",
    "dep:tokenizers",
]

[dependencies]
rustyred-thg-core = { path = "../rustyred-thg-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", optional = true }
burn = { version = "0.21.0", default-features = false, features = ["std", "ndarray", "wgpu", "fusion", "cubecl", "autodiff"], optional = true }
cubecl = { version = "0.10.0", default-features = false, features = ["std", "stdlib", "wgpu"], optional = true }
candle-core = { version = "0.10.2", optional = true }
candle-nn = { version = "0.10.2", optional = true }
candle-transformers = { version = "0.10.2", optional = true }
hf-hub = { version = "0.5", optional = true }
image = { version = "0.25.10", default-features = false, optional = true }
tokenizers = { version = "0.22.2", optional = true }
