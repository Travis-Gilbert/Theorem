[package]
name = "rustyred-thg-catalog"
version = "0.1.0"
edition = "2021"
description = "Relational catalog (tenants, projects, billing, auth) and the cold index for the RustyRedCore-THG storage spine, over sqlx/Postgres. The catalog is a catalog: it stores tier residency and addresses, never a re-encoding of the graph."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { path = "../rustyred-thg-core" }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "json", "time"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
