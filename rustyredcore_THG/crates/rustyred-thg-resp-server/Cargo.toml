[package]
name = "rustyred-thg-resp-server"
version = "0.5.0"
edition = "2021"
description = "RESP protocol server for RustyRedCore-THG ordered-index commands."

[dependencies]
redis-protocol = "5"
serde_json = "1.0"
rustyred-thg-core = { path = "../rustyred-thg-core", features = ["redis-store"] }
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread"] }
