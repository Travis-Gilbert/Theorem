[package]
name = "rustyred-thg-lift"
version = "0.1.0"
edition = "2021"
description = "Minimal THIR lifter for Theorem reconstruction."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-thg-binformat = { path = "../rustyred-thg-binformat" }
rustyred-thg-core = { path = "../rustyred-thg-core" }
rustyred-thg-disasm = { path = "../rustyred-thg-disasm" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
