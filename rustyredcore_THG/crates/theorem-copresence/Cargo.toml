[package]
name = "theorem-copresence"
version = "0.1.0"
edition = "2021"
description = "Headless co-presence peer and surface-adapter seam over the RustyRed substrate."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { path = "../rustyred-thg-core" }
theorem-harness-core = { path = "../theorem-harness-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
yrs = "0.27.2"

[dev-dependencies]
tempfile = "3.10"
