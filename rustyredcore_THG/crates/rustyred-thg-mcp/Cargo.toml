[package]
name = "rustyred-thg-mcp"
version = "0.5.0"
edition = "2021"
description = "Model Context Protocol adapter for the Theorem HotGraph graph database."
license = "MIT"
rust-version = "1.85"

[features]
default = []
redis-store = ["rustyred-thg-core/redis-store"]

[dependencies]
async-graphql = "7"
futures-executor = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ensemble = { path = "../ensemble" }
rustyred-thg-core = { path = "../rustyred-thg-core" }
rustyred-thg-code = { path = "../rustyred-thg-code" }
rustyred-thg-affordances = { path = "../rustyred-thg-affordances" }
rustyred-thg-connectors = { path = "../rustyred-thg-connectors" }
theorem-harness-core = { path = "../theorem-harness-core" }
theorem-harness-runtime = { path = "../theorem-harness-runtime" }
tokio = { version = "1", features = ["sync"] }
