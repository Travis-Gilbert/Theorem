[package]
name = "rustyred-thg-affordances"
version = "0.1.0"
edition = "2021"
description = "Connector-as-substrate learning registry: MCP tools as first-class Affordance graph nodes with learned, scoped selection over RustyRedCore-THG."
license = "MIT"
repository = "https://github.com/Travis-Gilbert/Theorem"
documentation = "https://docs.rs/rustyred-thg-affordances"
readme = "README.md"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { version = "0.5.0", path = "../rustyred-thg-core" }
theorem-harness-core = { version = "0.1.0", path = "../theorem-harness-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
