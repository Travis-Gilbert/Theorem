[package]
name = "theorem-harness-runtime"
version = "0.1.0"
edition = "2021"
description = "Rust-native Theorem harness runtime: GraphStore-backed event log and run persistence."
license = "MIT"
repository = "https://github.com/Travis-Gilbert/Theorem"
documentation = "https://docs.rs/theorem-harness-runtime"
readme = "README.md"
rust-version = "1.85"

[dependencies]
rustyred-thg-affordances = { version = "0.1.0", path = "../rustyred-thg-affordances" }
rustyred-thg-core = { version = "0.5.0", path = "../rustyred-thg-core" }
prose-check = { version = "0.1.0", path = "../prose-check" }
design-check = { version = "0.1.0", path = "../design-check" }
reqwest = { version = "0.12.22", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
theorem-harness-core = { version = "0.1.0", path = "../theorem-harness-core" }
theorem-prompt = { version = "0.1.0", path = "../theorem-prompt" }
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"

[dev-dependencies]
# Test-only: assert the project-anchor id stays byte-identical to the memory crate's
# recall-side helper (cut-5 cross-crate parity guard). Not a runtime dependency.
rustyred-thg-memory = { version = "0.1.0", path = "../rustyred-thg-memory" }
