[package]
name = "theorem-harness-runtime"
version = "0.1.0"
edition = "2021"
description = "Rust-native Theorem harness runtime: GraphStore-backed event log and run persistence."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { path = "../rustyred-thg-core" }
prose-check = { path = "../prose-check" }
reqwest = { version = "0.12.22", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
theorem-harness-core = { path = "../theorem-harness-core" }
tokio = { version = "1", features = ["sync"] }
