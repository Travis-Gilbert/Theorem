[package]
name = "rustyred-thg-reconstruct-harness"
version = "0.1.0"
edition = "2021"
description = "Harness capability pack for Theorem binary reconstruction."
license = "MIT"
rust-version = "1.85"

[dependencies]
hex = "0.4"
rustyred-thg-binformat = { path = "../rustyred-thg-binformat" }
rustyred-thg-core = { path = "../rustyred-thg-core" }
rustyred-thg-disasm = { path = "../rustyred-thg-disasm" }
rustyred-thg-lift = { path = "../rustyred-thg-lift" }
rustyred-thg-reconstruct = { path = "../rustyred-thg-reconstruct" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
url = "2.5"
ureq = "3"
