[package]
name = "rustyred-thg-offload"
version = "0.1.0"
edition = "2021"
description = "Compute-offload planner: operation algebra, version-keyed reuse, calibrated cascade, verification receipts, and CPU graph affordances for Theorem."
license = "MIT"
repository = "https://github.com/Travis-Gilbert/Theorem"
documentation = "https://docs.rs/rustyred-thg-offload"
readme = "README.md"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { version = "0.5.0", path = "../rustyred-thg-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
