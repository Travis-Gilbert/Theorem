[package]
name = "rustyred-web"
version = "0.1.0"
edition = "2021"
description = "RustyWeb graph-native crawler kernel for Theorem."
license = "MIT"
rust-version = "1.85"

[dependencies]
blake3 = "1.8.5"
lol_html = "2.9.0"
reqwest = { version = "0.12.22", default-features = false, features = ["http2", "rustls-tls"] }
rustyred-thg-core = { path = "../rustyred-thg-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
url = "2.5.8"

[dev-dependencies]
tokio = { version = "1.47.1", features = ["macros", "rt-multi-thread"] }
