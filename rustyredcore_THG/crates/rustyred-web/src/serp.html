<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Substrate search</title>
<style>
  :root {
    --ink: #2A2823;
    --ink-soft: #6b665c;
    --paper: #f4f1ea;
    --paper-soft: #ece8df;
    --rule: #d9d4c8;
    --accent: #b45a2d;
    --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--paper); color: var(--ink); }
  body { display: flex; flex-direction: column; font-family: var(--mono); }
  header {
    border-bottom: 1px solid var(--rule);
    background: var(--paper-soft);
    padding: 14px 22px 12px;
  }
  .eyebrow {
    margin: 0; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .query { margin: 4px 0 0; font-size: 22px; font-weight: 600; min-height: 26px; }
  .query.empty { color: var(--ink-soft); font-weight: 400; }
  .status { margin: 8px 0 0; font-size: 11px; color: var(--ink-soft); min-height: 14px; }
  .legend { display: flex; gap: 14px; margin-top: 8px; font-size: 10px;
            letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--accent); }
  #stage { position: relative; flex: 1; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  #empty {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 32px;
    color: var(--ink-soft); font-size: 13px; line-height: 1.6; max-width: 460px; margin: 0 auto;
  }
  #empty strong { display: block; color: var(--ink); font-size: 18px; margin-bottom: 6px; }
  #empty .accent { color: var(--accent); }
  #tip {
    position: absolute; pointer-events: none; display: none; max-width: 320px;
    padding: 8px 10px; border: 1px solid var(--rule); border-radius: 6px;
    background: var(--paper-soft); font-size: 11px; line-height: 1.45; color: var(--ink);
    box-shadow: 0 4px 14px rgba(42, 40, 35, 0.12);
  }
  #tip .u { color: var(--accent); word-break: break-all; margin-top: 2px; }
  #tip .s { color: var(--ink-soft); margin-top: 3px; }
  #tip .r { color: var(--ink-soft); }
</style>
</head>
<body>
  <header>
    <p class="query" id="query"></p>
    <p class="status" id="status"></p>
    <div class="legend" id="legend"></div>
  </header>
  <div id="stage">
    <canvas id="graph"></canvas>
    <div id="empty"></div>
    <div id="tip"></div>
  </div>

<script>
// The browser's load_web_resource hook replaces the next line with the real
// SubstrateSearch payload (serde JSON) before serving this page. Left as null,
// the page renders an honest empty state — never fake data. All page text is
// set via textContent / DOM construction (never innerHTML): titles, urls, and
// snippets come from crawled pages and are untrusted.
var SERP_DATA = null; // __SERP_DATA__

(function () {
  "use strict";

  var INK = "#2A2823", INK_SOFT = "#6b665c", ACCENT = "#b45a2d", PAPER = "#f4f1ea";
  var RING_NAMES = ["match", "adjacent", "nearby", "distant"];

  function ringName(r) { return RING_NAMES[r] || "distant"; }

  /** createElement helper: tag, className, textContent (text is always safe). */
  function el(tag, cls, text) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (text != null) node.textContent = String(text);
    return node;
  }

  var data = SERP_DATA && Array.isArray(SERP_DATA.hits)
    ? SERP_DATA
    : { query: "", hits: [], links: [], matched_count: 0, kept_count: 0 };

  // ---- header (textContent only) ----
  var queryEl = document.getElementById("query");
  if (data.query) {
    queryEl.textContent = data.query;
  } else {
    queryEl.classList.add("empty");
    queryEl.textContent = "Browse your substrate";
  }

  var statusEl = document.getElementById("status");
  if (data.kept_count === 0) {
    statusEl.textContent = data.query
      ? "New territory: nothing in scope matches yet."
      : "Nothing captured yet.";
  } else if (!data.query) {
    statusEl.textContent = "Browsing " + data.kept_count + " pages.";
  } else {
    statusEl.textContent = data.matched_count + " direct match"
      + (data.matched_count === 1 ? "" : "es") + ", " + data.kept_count + " in the neighbourhood.";
  }

  // ---- legend (ring names only, no user data; still built via DOM) ----
  var maxRing = data.hits.reduce(function (m, h) { return Math.max(m, h.ring || 0); }, 0);
  var legend = document.getElementById("legend");
  if (data.kept_count > 0) {
    for (var r = 0; r <= Math.min(3, maxRing); r++) {
      var span = el("span");
      var dot = el("span", "dot");
      dot.style.background = r === 0 ? ACCENT : "transparent";
      dot.style.opacity = String(1 - r * 0.22);
      span.appendChild(dot);
      span.appendChild(document.createTextNode(ringName(r)));
      legend.appendChild(span);
    }
  }

  // ---- empty state (query is untrusted -> textContent) ----
  if (data.kept_count === 0) {
    var emptyEl = document.getElementById("empty");
    if (data.query) {
      emptyEl.appendChild(el("strong", null, "New territory."));
      emptyEl.appendChild(document.createTextNode("Nothing in your substrate connects to "));
      emptyEl.appendChild(el("span", "accent", "“" + data.query + "”"));
      emptyEl.appendChild(document.createTextNode(" yet. That is itself a finding: this is unexplored ground."));
    } else {
      emptyEl.appendChild(el("strong", null, "No knowledge captured yet."));
      emptyEl.appendChild(document.createTextNode("Browse a few pages and their shape will appear here."));
    }
    emptyEl.style.display = "flex";
    return;
  }

  // ---- canvas graph ----
  var canvas = document.getElementById("graph");
  var ctx = canvas.getContext("2d");
  var stage = document.getElementById("stage");
  var tip = document.getElementById("tip");
  var nodes = [];
  var nodeIndex = {};
  var W = 0, H = 0;

  function layout() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var rect = stage.getBoundingClientRect();
    W = Math.max(1, Math.min(rect.width, 8192));
    H = Math.max(1, Math.min(rect.height, 8192));
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var byRing = {};
    data.hits.forEach(function (h) { (byRing[h.ring] = byRing[h.ring] || []).push(h); });

    var cx = W / 2, cy = H / 2;
    var step = Math.max(70, Math.min(W, H) / (2 * (maxRing + 1.4)));
    var index = {};
    nodes = [];

    Object.keys(byRing).map(Number).sort(function (a, b) { return a - b; }).forEach(function (ring) {
      var group = byRing[ring];
      var n = group.length;
      var radius = ring === 0 ? (n === 1 ? 0 : step * 0.5) : step * (ring + 0.4);
      group.forEach(function (hit, i) {
        var angle = (i / Math.max(1, n)) * Math.PI * 2 + ring * 0.6;
        var x = cx + Math.cos(angle) * radius;
        var y = cy + Math.sin(angle) * radius;
        var nodeR = ring === 0 ? 7 + Math.min(8, (hit.match_score || 1) * 1.5) : Math.max(3.5, 6 - ring);
        var node = { hit: hit, x: x, y: y, r: nodeR };
        nodes.push(node);
        index[hit.node_id] = node;
      });
    });
    return index;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(42,40,35,0.16)";
    (data.links || []).forEach(function (link) {
      var a = nodeIndex[link.source], b = nodeIndex[link.target];
      if (!a || !b) return;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    });

    nodes.forEach(function (node) {
      var ring = node.hit.ring || 0;
      ctx.globalAlpha = Math.max(0.35, 1 - ring * 0.22);
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
      if (ring === 0) {
        ctx.fillStyle = ACCENT;
        ctx.fill();
      } else {
        ctx.fillStyle = PAPER;
        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = INK_SOFT;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    });

    ctx.fillStyle = INK;
    ctx.font = '11px ' + getComputedStyle(document.body).fontFamily;
    ctx.textAlign = "center";
    nodes.forEach(function (node) {
      if ((node.hit.ring || 0) > 1) return;
      var label = node.hit.title || node.hit.url || node.hit.node_id;
      if (label.length > 22) label = label.slice(0, 21) + "…";
      ctx.globalAlpha = (node.hit.ring || 0) === 0 ? 1 : 0.7;
      ctx.fillText(label, node.x, node.y + node.r + 13);
      ctx.globalAlpha = 1;
    });
  }

  function hitTest(mx, my) {
    for (var i = nodes.length - 1; i >= 0; i--) {
      var n = nodes[i];
      var dx = mx - n.x, dy = my - n.y;
      if (dx * dx + dy * dy <= (n.r + 4) * (n.r + 4)) return n;
    }
    return null;
  }

  stage.addEventListener("mousemove", function (e) {
    var rect = stage.getBoundingClientRect();
    var node = hitTest(e.clientX - rect.left, e.clientY - rect.top);
    if (!node) { tip.style.display = "none"; return; }
    var h = node.hit;
    // Rebuild tooltip with textContent (title/url/snippet are untrusted).
    while (tip.firstChild) tip.removeChild(tip.firstChild);
    var head = el("div", null, h.title || "");
    head.appendChild(el("span", "r", " [" + ringName(h.ring) + "]"));
    tip.appendChild(head);
    if (h.url) tip.appendChild(el("div", "u", h.url));
    if (h.snippet) tip.appendChild(el("div", "s", h.snippet));
    tip.style.display = "block";
    var tx = Math.min(e.clientX - rect.left + 14, rect.width - 330);
    tip.style.left = Math.max(8, tx) + "px";
    tip.style.top = (e.clientY - rect.top + 14) + "px";
  });
  stage.addEventListener("mouseleave", function () { tip.style.display = "none"; });

  function render() { nodeIndex = layout(); draw(); }
  window.addEventListener("resize", render);
  render();
})();
</script>
</body>
</html>
