[package]
name = "rustyred-thg-connectors"
version = "0.1.0"
edition = "2021"
description = "Live MCP connector transport: connect to an external MCP server, list its tools, and register them as learnable Affordance graph nodes via rustyred-thg-affordances."
license = "MIT"
repository = "https://github.com/Travis-Gilbert/Theorem"
documentation = "https://docs.rs/rustyred-thg-connectors"
readme = "README.md"
rust-version = "1.85"

[dependencies]
rustyred-thg-affordances = { version = "0.1.0", path = "../rustyred-thg-affordances" }
rustyred-thg-core = { version = "0.5.0", path = "../rustyred-thg-core" }
rustyred-plugin = { version = "0.1.0", path = "../rustyred-plugin" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = { version = "3.3.0", default-features = false, features = ["rustls"] }
