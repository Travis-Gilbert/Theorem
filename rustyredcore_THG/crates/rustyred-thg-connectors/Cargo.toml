[package]
name = "rustyred-thg-connectors"
version = "0.1.0"
edition = "2021"
description = "Live MCP connector transport: connect to an external MCP server, list its tools, and register them as learnable Affordance graph nodes via rustyred-thg-affordances."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-thg-affordances = { path = "../rustyred-thg-affordances" }
rustyred-thg-core = { path = "../rustyred-thg-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
