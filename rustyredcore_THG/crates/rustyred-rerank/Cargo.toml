[package]
name = "rustyred-rerank"
version = "0.1.0"
edition = "2021"
description = "Reranker scorer implementations for RustyRed membrane admission."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-membrane = { path = "../rustyred-membrane" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12.22", default-features = false, features = ["blocking", "json", "rustls-tls"] }
