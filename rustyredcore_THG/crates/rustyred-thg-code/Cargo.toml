[package]
name = "rustyred-thg-code"
version = "0.7.0"
edition = "2021"
description = "Code parsing plugin/runtime for RustyRedCore-THG tenant graph stores."
license = "MIT"
rust-version = "1.85"

[dependencies]
ignore = "0.4"
rayon = "1.10"
rustyred-code-embedding = { path = "../rustyred-code-embedding" }
rustyred-membrane = { path = "../rustyred-membrane", features = ["graph-store"] }
rustyred-rerank = { path = "../rustyred-rerank" }
rustyred-thg-core = { path = "../rustyred-thg-core" }
serde_json = "1.0"
syn = { version = "2", features = ["full", "visit"] }
tree-sitter = "0.26"
tree-sitter-javascript = "0.25"
tree-sitter-python = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-typescript = "0.23"

[features]
default = []
code-embedding-http = ["rustyred-code-embedding/http"]
code-embedding-local = ["rustyred-code-embedding/local"]
