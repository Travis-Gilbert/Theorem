[package]
name = "theorem-harness"
version = "0.1.0"
edition = "2021"
description = "theorem-harness SDK v2: the idiomatic Rust surface over theorem-harness-core and theorem-harness-runtime. Streamed runs, sessions-as-scopes, idempotency, cancellation, resumable events, and trace export. The source of truth the Python/Node/Swift/WASM bindings are generated from."
license = "MIT"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { path = "../rustyred-thg-core" }
theorem-harness-core = { path = "../theorem-harness-core" }
theorem-harness-runtime = { path = "../theorem-harness-runtime" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
