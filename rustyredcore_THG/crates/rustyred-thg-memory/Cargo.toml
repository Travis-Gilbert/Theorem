[package]
name = "rustyred-thg-memory"
version = "0.1.0"
edition = "2021"
description = "Graph-native memory recall, consolidation, decay, and validity plugin for RustyRedCore-THG."
license = "MIT"
repository = "https://github.com/Travis-Gilbert/Theorem"
documentation = "https://docs.rs/rustyred-thg-memory"
readme = "README.md"
rust-version = "1.85"

[dependencies]
rustyred-thg-core = { version = "0.5.0", path = "../rustyred-thg-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
