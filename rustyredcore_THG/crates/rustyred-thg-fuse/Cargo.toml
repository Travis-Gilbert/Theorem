[package]
name = "rustyred-thg-fuse"
version = "0.1.0"
edition = "2021"
description = "Read-only FUSE/path index over zero-copy RustyRed THG graph archives."
license = "MIT"
rust-version = "1.85"

[features]
default = []
mount = ["dep:fuser", "dep:libc"]

[dependencies]
fuser = { version = "0.17.0", optional = true }
libc = { version = "0.2", optional = true }
rustyred-thg-core = { path = "../rustyred-thg-core" }
serde_json = "1.0"
