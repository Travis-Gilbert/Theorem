[package]
name = "rustyred-thg-core"
version = "0.5.0"
edition = "2021"
description = "Theorem HotGraph core command executor and state machine."
license = "MIT"
repository = "https://github.com/Travis-Gilbert/Theorem"
documentation = "https://docs.rs/rustyred-thg-core"
readme = "README.md"
rust-version = "1.85"

[features]
default = []
redis-store = ["dep:redis"]
# Optional vector-index acceleration. Default builds keep the exact in-memory
# vector search and avoid TurboVec's BLAS-linked dependency graph.
vector-accelerated = ["dep:turbovec"]
# §P5-A pa5.1+pa5.2: tantivy as alternative full-text backend behind
# RUSTY_RED_FULLTEXT_BACKEND=tantivy. Default builds keep the hand-rolled BM25.
tantivy = ["dep:tantivy"]
# §P8-A pa8.1+pa8.2: S2 cells as alternative spatial backend behind
# RUSTY_RED_SPATIAL_BACKEND=s2. Default builds keep H3.
s2 = ["dep:s2"]
# Optional GraphBLAS sparse-matrix compute: typed adjacency over graph_csr,
# semiring traversal, LAGraph algorithms, and CFL-reachability. Pulls in the
# native rustyred-thg-graphblas leaf crate (SuiteSparse:GraphBLAS + LAGraph);
# default builds stay native-free (no libgraphblas required).
graphblas = ["dep:rustyred-thg-graphblas"]

[dependencies]
egg = "0.10"
egglog = { version = "2.0.0", default-features = false }
fs2 = "0.4"
h3o = "0.7"
imbl = { version = "7.0.0", features = ["serde"] }
redis = { version = "0.27", optional = true }
memmap2 = "0.9.11"
rkyv = "0.8.16"
roaring = "0.10"
s2 = { version = "0.0.12", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tantivy = { version = "0.22", optional = true }
turbovec = { version = "0.8.0", optional = true }
rustyred-thg-graphblas = { path = "../rustyred-thg-graphblas", optional = true }
zstd = "0.13"

[dev-dependencies]
theorem-harness-core = { version = "0.1.0", path = "../theorem-harness-core" }
