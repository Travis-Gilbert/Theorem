[package]
name = "theorem-harness-core"
version = "0.1.0"
edition = "2021"
description = "Rust-native Theorem harness run controller: state transitions, guards, hashes, and replay/fork contracts."
license = "MIT"
rust-version = "1.85"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
ulid = "1"
uuid = { version = "1.11", features = ["v4", "serde"] }
