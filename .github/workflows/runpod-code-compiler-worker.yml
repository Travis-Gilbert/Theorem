name: runpod code compiler worker image

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout theorem
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: runpod/theorem_code_compiler_worker
          file: runpod/theorem_code_compiler_worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/travis-gilbert/theorem-code-compiler-worker:latest
            ghcr.io/travis-gilbert/theorem-code-compiler-worker:${{ github.sha }}
