name: servo-browser build

# Validates the Servo build environment in CI (the long-pole dependency for the
# substrate-native browser; build host chosen 2026-05-29). Keeps the heavy Servo
# build OFF the developer machine and reproducible.
#
# v1 (done): proved Servo builds off-machine via its own ./mach bootstrap +
#   ./mach build. Green at rev b891f04 on 2026-05-29 (toml dep + disk reclaim).
# v2b step 1 (this file now): build the theorem-browser embedder (apps/browser)
#   as an EXTERNAL Cargo consumer of the `servo` crate pinned to that same rev.
#   `mach bootstrap` still provides the system libs; the embedder then builds
#   libservo via plain cargo (the real consumer-side proof) with a minimal
#   engine-construction main.rs. Reference: servo/components/servo/examples/
#   winit_minimal.rs at the pinned rev.
# v2b step 2 (next, on a warm cache): add the WebView + the
#   WebViewDelegate::load_web_resource substrate seam (calls
#   theorem_browser_substrate::ingest_loaded_pages) and load a real URL headless.
# Windowed macOS desktop run is a later milestone (a macOS runner or local).
#
# Manual trigger only: a full Servo build is heavy. Do not run on every push.
# No workflow inputs by design (avoids untrusted-input injection; pin the Servo
# rev in-file below for reproducibility).

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  servo-build:
    # Linux headless build/verify is the cheapest path and proves the embed +
    # substrate seam without a window. NOTE: ubuntu-latest may be undersized for
    # a full Servo build (disk/cores). If the first run hits resource limits,
    # move to a larger GitHub runner, a self-hosted runner, or the remote-box
    # build option. This is the iterate-by-running step.
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout theorem
        uses: actions/checkout@v4
        with:
          path: theorem

      - name: Checkout Servo
        uses: actions/checkout@v4
        with:
          repository: servo/servo
          # Pinned to the rev the embedder's Cargo.toml depends on, so `mach
          # bootstrap` installs the system libs matching the libservo we build.
          ref: b891f04d0819272b27e80ac975e2e57d3cb9e66b
          path: servo

      - name: Show Rust toolchain (Servo pins its own via rust-toolchain.toml)
        working-directory: servo
        run: rustup show

      - name: Cache cargo registry + embedder target
        uses: actions/cache@v4
        with:
          # Cache the embedder's target (where libservo compiles as a git dep)
          # so the FIRST build pays the full libservo cost once and step-2
          # iterations (WebView + seam) recompile only our crate on a warm cache.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            theorem/apps/browser/target
          key: embed-${{ runner.os }}-${{ hashFiles('theorem/apps/browser/Cargo.toml', 'theorem/apps/browser/rust-toolchain.toml') }}
          restore-keys: |
            embed-${{ runner.os }}-

      - name: Bootstrap Servo build dependencies
        working-directory: servo
        run: python3 ./mach bootstrap --force || python3 ./mach bootstrap

      - name: Install mach Python dependencies
        working-directory: servo
        # mach loads its command modules (bootstrap_commands.py imports toml) with
        # the invoking Python BEFORE activating its managed venv, so the runner
        # Python needs mach's deps. Fixes "ModuleNotFoundError: No module named 'toml'".
        run: |
          python3 -m pip install --break-system-packages toml
          if [ -f python/requirements.txt ]; then python3 -m pip install --break-system-packages -r python/requirements.txt; fi

      - name: Free disk space
        # A Servo --dev build's target dir exceeds ubuntu-latest's ~14GB free
        # (prior run failed with "No space left on device" deep in components/).
        # Reclaim the preinstalled SDKs we don't use (~20-25GB: Android, .NET,
        # Haskell, CodeQL, boost). Do NOT remove /opt/hostedtoolcache root: the
        # runner's python3 (which ran bootstrap + holds mach's deps) lives there.
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo apt-get clean || true
          echo "After:"; df -h /

      - name: Build theorem-browser embedder (cargo; builds libservo as a git dep)
        working-directory: theorem/apps/browser
        env:
          # Drop debuginfo: libservo debug artifacts are the bulk of the target
          # dir; we validate the build, not debug libservo internals.
          CARGO_PROFILE_DEV_DEBUG: "0"
        # v2b step 1: prove libservo builds + links as an EXTERNAL Cargo git
        # dependency (not via mach) at the pinned rev, with the embedder's
        # minimal engine-construction main.rs. `mach bootstrap` above provided
        # the system libs; apps/browser pins Servo's toolchain via its own
        # rust-toolchain.toml so the whole graph builds with 1.95.0. This is the
        # real consumer-side proof and the open question (does external cargo
        # embed work without mach orchestration). If it fails, the log says
        # whether the gap is a missing system lib, a build-script, or crown.
        run: cargo build
