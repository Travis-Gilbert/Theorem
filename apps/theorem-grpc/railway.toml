# Railway deploy config for theorem-grpc (Theorem's first gRPC service).
#
# Deploy as a NEW Railway service in the existing Theorem project. Set the
# service Root Directory so the Docker build context is the Theorem repo root
# (so the ../../rustyredcore_THG COPYs in the Dockerfile resolve). The civic
# backend then dials this service by setting THEOREM_SEARCH_URL to its
# internal/public gRPC URL (e.g. http://theorem-grpc.railway.internal:8080).
#
# No healthcheckPath: this is a pure-gRPC server with no HTTP route, so an HTTP
# healthcheck would fail the deploy. Railway falls back to "process is up". If a
# healthcheck is later wanted, add grpc-health-probe or a tiny axum /ready on
# the same listener (the HTTP+gRPC merge pattern rustyred-thg-server uses).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/theorem-grpc/Dockerfile"

[deploy]
startCommand = "theorem-grpc-server"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
