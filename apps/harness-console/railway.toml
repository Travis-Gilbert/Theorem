# Railway deploy config for the harness-console Next.js app.
# Set the Railway service Root Directory to apps/harness-console so this file and
# the Dockerfile are the build root (the repo root has no package.json, so
# auto-detect mis-reads the monorepo). The Dockerfile owns build + start.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
