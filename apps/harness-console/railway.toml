# Railway deploy config for the harness-console Next.js app.
# Set the Railway service Root Directory to apps/harness-console so this file and
# the app's package.json are the build root. Nixpacks auto-detects Next.js
# (npm ci + next build); `next start` binds 0.0.0.0:$PORT (Railway provides PORT).
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
