# XcodeGen spec for the Theorem iOS app target.
#
# The app is a thin shell over the TheoremIOSCore SwiftPM package (one dir up):
# it carries only the @main App; all UI + logic + Grape + the bundled OFL fonts
# come from the package. Generate with `xcodegen generate` in this dir; the
# resulting Theorem.xcodeproj is gitignored (it's reproducible from this spec).
name: Theorem
options:
  bundleIdPrefix: me.travisgilbert
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  TheoremIOS:
    path: ..
targets:
  Theorem:
    type: application
    platform: iOS
    sources:
      - Theorem
    dependencies:
      - package: TheoremIOS
        product: TheoremIOSCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.travisgilbert.theorem
        PRODUCT_NAME: Theorem
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          # Simulator builds need no signing.
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
          CODE_SIGNING_REQUIRED: YES
